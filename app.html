<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NexERM — Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563EB'/><text x='6' y='23' font-size='20' font-family='monospace' fill='white'>N</text></svg>"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/app.css"/>
</head>
<body class="app-body">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="brand-logo">N</div>
      <span class="brand-name">NexERM</span>
    </div>
    <button class="sidebar-close" id="sidebarClose">✕</button>
  </div>
  <div class="sidebar-company" id="sidebarCompany">Loading...</div>
  <nav class="sidebar-nav">
    <div class="nav-group-label">OVERVIEW</div>
    <a class="nav-link active" data-page="dashboard" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
    </a>
    <div class="nav-group-label">WORKFORCE</div>
    <a class="nav-link" data-page="employees" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Employees
    </a>
    <a class="nav-link" data-page="departments" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Departments
    </a>
    <div class="nav-group-label">TIME &amp; SHIFTS</div>
    <a class="nav-link" data-page="shifts" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Shift Manager
    </a>
    <a class="nav-link" data-page="attendance" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Attendance
    </a>
    <a class="nav-link" data-page="leaves" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Leave Requests
    </a>
    <div class="nav-group-label">FINANCE</div>
    <a class="nav-link" data-page="payroll" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Payroll
    </a>
    <div class="nav-group-label">INSIGHTS</div>
    <a class="nav-link" data-page="reports" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reports
    </a>
    <div class="nav-group-label">SYSTEM</div>
    <a class="nav-link" data-page="settings" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user" id="sidebarUser">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-details">
        <div class="user-name" id="userName">Loading...</div>
        <div class="user-role" id="userRole">Admin</div>
      </div>
    </div>
    <button class="btn-logout" onclick="handleLogout()" title="Logout">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>

<div class="app-main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" id="menuToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="breadcrumb">
        <span class="breadcrumb-app">NexERM</span>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-page" id="breadcrumbPage">Dashboard</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="globalSearch" placeholder="Search employees..."/>
      </div>
      <div class="topbar-date" id="topbarDate"></div>
      <div class="notif-wrap">
        <button class="notif-btn" id="notifBtn" onclick="toggleNotif()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot" id="notifDot" style="display:none"></span>
        </button>
        <div class="notif-panel" id="notifPanel" style="display:none">
          <div class="notif-header">Notifications</div>
          <div id="notifList" class="notif-list"></div>
        </div>
      </div>
    </div>
  </header>
  <main class="page-area" id="pageArea">
    <div class="page-loading"><div class="spinner"></div></div>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-box" id="modalBox">
    <div class="modal-head">
      <h3 class="modal-title" id="modalTitle"></h3>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<script src="../js/config.js"></script>
<script src="../js/db.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/app.js"></script>
<script src="../js/pages/dashboard.js"></script>
<script src="../js/pages/employees.js"></script>
<script src="../js/pages/departments.js"></script>
<script src="../js/pages/shifts.js"></script>
<script src="../js/pages/attendance.js"></script>
<script src="../js/pages/leaves.js"></script>
<script src="../js/pages/payroll.js"></script>
<script src="../js/pages/reports.js"></script>
<script src="../js/pages/settings.js"></script>
</body>
</html>
